name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.configuration }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Orynivo/Orynivo.csproj

      - name: Build application
        run: >
          dotnet build Orynivo/Orynivo.csproj
          --configuration ${{ matrix.configuration }}
          --no-restore
          --warnaserror
          /p:IncludeAsioBridge=false

      - name: Publish Windows build
        if: matrix.configuration == 'Release'
        run: >
          dotnet publish Orynivo/Orynivo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output artifacts/Orynivo-win-x64
          /p:IncludeAsioBridge=false

      - name: Upload Windows build
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v6
        with:
          name: Orynivo-win-x64
          path: artifacts/Orynivo-win-x64
          if-no-files-found: error
